name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-and-release:
    name: Build and Release
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
        include:
          - os: ubuntu-latest
            artifact_name: glab-tui
            asset_name: glab-tui-linux-amd64.tar.gz
          - os: windows-latest
            artifact_name: glab-tui.exe
            asset_name: glab-tui-windows-amd64.zip

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build release binary
        run: cargo build --release

      - name: Package binary (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: |
          tar -czf ${{ matrix.asset_name }} -C target/release ${{ matrix.artifact_name }}

      - name: Package binary (Windows)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          Compress-Archive -Path target\release\${{ matrix.artifact_name }} -DestinationPath ${{ matrix.asset_name }}

      - name: Upload binaries to Release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ matrix.asset_name }}
          prerelease: ${{ contains(github.ref_name, '-') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
